name: Build seng

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW (GCC)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: Build seng
        shell: msys2 {0}
        run: |
          gcc -std=c99 -O2 -Isrc \
              src/common.c src/lexer.c src/ast.c src/parser.c \
              src/value.c  src/env.c   src/packages.c src/interp.c \
              src/compiler.c src/vm.c src/main.c \
              -o seng.exe -lwininet
          echo "Build complete"
          ./seng.exe help

      - name: Run examples
        shell: msys2 {0}
        run: |
          echo "=== hello ===" && ./seng.exe examples/hello.se
          echo "=== loops ===" && ./seng.exe examples/loops.se
          echo "=== functions ===" && ./seng.exe examples/functions.se
          echo "=== lists ===" && ./seng.exe examples/lists.se

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seng-windows-x64
          path: seng.exe

  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make libcurl4-openssl-dev

      - name: Build seng
        run: |
          make
          echo "Build complete"
          ./seng help

      - name: Run examples
        run: |
          make test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seng-linux-x64
          path: seng

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: seng-windows-x64
          path: ./bin-win

      - name: Download Linux artifact
        uses: actions/download-artifact@v8
        with:
          name: seng-linux-x64
          path: ./bin-linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin-win/seng.exe
            bin-linux/seng
          body: |
            ## seng ${{ github.ref_name }}
            
            ### Download
            - **Windows**: `seng.exe`
            - **Linux**: `seng`
            
            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
