name: Build seng

on:
  push:
    branches: [ main, develop ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MinGW (GCC)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc

      - name: Build seng
        shell: msys2 {0}
        run: |
          gcc -std=c99 -O2 -Isrc \
              src/common.c src/lexer.c src/ast.c src/parser.c \
              src/value.c  src/env.c   src/interp.c \
              src/compiler.c src/vm.c src/main.c \
              -o seng.exe -lm
          echo "Build complete"
          ./seng.exe help

      - name: Run examples
        shell: msys2 {0}
        run: |
          echo "=== hello ===" && ./seng.exe examples/hello.se
          echo "=== loops ===" && ./seng.exe examples/loops.se
          echo "=== functions ===" && ./seng.exe examples/functions.se
          echo "=== lists ===" && ./seng.exe examples/lists.se
          echo "=== calculator ===" && ./seng.exe examples/calculator.se

      - name: Test compile pipeline
        shell: msys2 {0}
        run: |
          ./seng.exe compile examples/hello.se
          ./seng.exe run examples/hello.sec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seng-windows-x64
          path: seng.exe

  release:
    name: Create Release
    runs-on: windows-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: seng-windows-x64

      - name: Build installer
        run: |
          iscc seng_installer.iss

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            installer/seng-setup-*.exe
            seng.exe
          body: |
            ## seng ${{ github.ref_name }}

            ### Download
            - **Windows Installer** (recommended): `seng-setup-*-windows-x64.exe`
            - **Portable**: `seng.exe` (no installation needed)

            ### What's New
            See [CHANGELOG.md](CHANGELOG.md) for details.

            Visit [nocorps.org](https://nocorps.org) for documentation.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
